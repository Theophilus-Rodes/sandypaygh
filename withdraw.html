<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Withdraw Balance | Sandypay</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #071a52, #0b5ed7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .withdraw-card {
      width: 100%;
      max-width: 450px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 24px;
      padding: 30px;
      color: white;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    h2 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      color: #dbeafe;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .notice-box {
      background: rgba(255, 193, 7, 0.15);
      border: 1px solid rgba(255, 193, 7, 0.4);
      color: #fff3cd;
      padding: 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 15px;
      margin-bottom: 18px;
      border: none;
      border-radius: 14px;
      outline: none;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: #fbbf24;
      color: #111827;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: .3s;
    }

    button:hover {
      background: #f59e0b;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .back-btn {
      margin-top: 12px;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .message {
      display: none;
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: bold;
    }

    .success {
      background: rgba(34,197,94,0.18);
      color: #bbf7d0;
      border: 1px solid rgba(34,197,94,0.4);
    }

    .error {
      background: rgba(239,68,68,0.18);
      color: #fecaca;
      border: 1px solid rgba(239,68,68,0.4);
    }
  </style>
</head>

<body>

  <div class="withdraw-card">
    <h2>Withdraw Balance</h2>

    <p class="subtitle">Enter your withdrawal details below.</p>

    <div class="notice-box">
      ⚠️ <strong>Important Notice:</strong><br><br>
      When you click <strong>Send Withdrawal Request</strong>, your withdrawal details will be sent automatically to Sandypay Admin through WhatsApp.
      Minimum withdrawal amount is <strong>GHS 50</strong>.
    </div>

    <form id="withdrawForm">
      <label>Telephone Number to Receive Money</label>
      <input type="tel" id="tel" placeholder="Eg. 0551234567" required>

      <label>Network</label>
      <select id="network" required>
        <option value="">Select Network</option>
        <option value="MTN">MTN</option>
        <option value="Telecel">Telecel</option>
        <option value="AirtelTigo">AirtelTigo</option>
      </select>

      <label>Amount to Withdraw</label>
      <input type="number" id="amount" placeholder="Minimum withdrawal is GHS 50" min="50" required>

      <button type="submit" id="sendBtn">Send Withdrawal Request</button>

      <button type="button" class="back-btn" onclick="history.back()">Go Back</button>

      <div id="messageBox" class="message"></div>
    </form>
  </div>

  <script>
    const API_BASE = "https://sandipay.co";

    const form = document.getElementById("withdrawForm");
    const sendBtn = document.getElementById("sendBtn");
    const messageBox = document.getElementById("messageBox");

    function showMessage(message, type) {
      messageBox.style.display = "block";
      messageBox.className = "message " + type;
      messageBox.innerText = message;
    }

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const tel = document.getElementById("tel").value.trim();
      const network = document.getElementById("network").value;
      const amount = parseFloat(document.getElementById("amount").value.trim());

      if (!tel || !network || !amount) {
        showMessage("Please fill all fields.", "error");
        return;
      }

      if (amount < 50) {
        showMessage("Minimum withdrawal amount is GHS 50.", "error");
        return;
      }

      const username =
        localStorage.getItem("username") ||
        localStorage.getItem("name") ||
        "Unknown User";

      const userId =
        localStorage.getItem("userId") ||
        localStorage.getItem("vendor_id") ||
        "Unknown ID";

      sendBtn.disabled = true;
      sendBtn.innerText = "Sending Request...";
      showMessage("Please wait, sending withdrawal request...", "success");

      try {
        const response = await fetch(`${API_BASE}/api/send-withdrawal-whatsapp`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            tel,
            network,
            amount,
            username,
            userId
          })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          showMessage(data.message || "Failed to send withdrawal request.", "error");
          return;
        }

        showMessage("Withdrawal request sent successfully to admin.", "success");
        form.reset();

      } catch (error) {
        showMessage("Network error. Please try again.", "error");
      } finally {
        sendBtn.disabled = false;
        sendBtn.innerText = "Send Withdrawal Request";
      }
    });
  </script>

</body>
</html>
