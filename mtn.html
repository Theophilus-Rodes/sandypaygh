<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sandypay | MTN Bundles</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root{
      --primary:#0A3D62;
      --accent:#1DD1A1;
      --bg:#F5F7FA;
      --card:#FFFFFF;
      --text:#1E293B;
      --muted:#64748B;
      --line:#E2E8F0;
      --danger:#ef4444;
    }
    *{box-sizing:border-box;font-family:Poppins,system-ui,Segoe UI,Roboto,Arial}
    body{margin:0;background:var(--bg);color:var(--text)}
    .header{
      background:linear-gradient(90deg,var(--primary),#082f49);
      color:#fff;padding:18px 16px;display:flex;align-items:center;justify-content:space-between;
      gap:12px;position:sticky;top:0;z-index:10;box-shadow:0 10px 30px rgba(2,6,23,.18);
    }
    .brand{display:flex;align-items:center;gap:10px}
    .logo{
      width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.14);
      display:flex;align-items:center;justify-content:center;font-weight:700;border:1px solid rgba(255,255,255,.18);
    }
    .brand .title{font-weight:700}
    .brand .sub{font-size:12px;opacity:.85;margin-top:2px}
    .pill{
      background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);
      padding:8px 12px;border-radius:999px;font-size:12px;white-space:nowrap;
    }
    .wrap{max-width:1100px;margin:0 auto;padding:18px 16px}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;
    }
    .back{
      border:none;background:#eaf2f7;color:var(--primary);
      padding:10px 12px;border-radius:12px;font-weight:700;cursor:pointer;
    }
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
    .pkg{
      background:var(--card);border-radius:16px;padding:14px;border:1px solid var(--line);
      box-shadow:0 10px 22px rgba(0,0,0,.05);display:flex;flex-direction:column;min-height:160px;
    }
    .pkg h4{margin:0 0 6px 0;color:var(--primary);font-size:15px}
    .price{font-weight:800;font-size:18px;margin:6px 0 8px}
    .meta{color:var(--muted);font-size:12px;margin-bottom:12px}
    .btn{
      margin-top:auto;width:100%;border:none;border-radius:12px;padding:11px 12px;
      cursor:pointer;background:var(--accent);color:#fff;font-weight:700;transition:.2s;
    }
    .btn:hover{opacity:.92}
    .btn:disabled{opacity:.65;cursor:not-allowed}
    .empty{padding:28px 10px;text-align:center;color:var(--muted)}

    .modal-backdrop{
      position:fixed;inset:0;background:rgba(2,6,23,.55);display:none;align-items:center;justify-content:center;
      padding:14px;z-index:1000;
    }
    .modal{
      width:min(560px,100%);background:var(--card);border-radius:18px;padding:16px;border:1px solid var(--line);
      box-shadow:0 24px 80px rgba(0,0,0,.35);
    }
    .modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .modal-header h3{margin:0;font-size:16px}
    .modal-sub{color:var(--muted);font-size:12px;margin-top:4px;line-height:1.35}
    .x{border:none;background:transparent;font-size:24px;cursor:pointer;line-height:1;color:#0f172a;}
    .row{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    .field input{
      width:100%;padding:12px 12px;border-radius:12px;border:1px solid var(--line);outline:none;font-size:14px;
    }
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(29,209,161,.18)}
    .helper{
      margin-top:8px;font-size:12px;color:var(--muted);background:#f1f5f9;border:1px solid var(--line);
      padding:10px 12px;border-radius:12px;line-height:1.4;
    }
    .modal-footer{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
    .btn-ghost{background:#eaf2f7;color:var(--primary)}

    .overlay{
      position:fixed;inset:0;background:rgba(2,6,23,.68);display:none;align-items:center;justify-content:center;
      padding:16px;z-index:1200;
    }
    .overlay-card{
      width:min(500px,100%);background:var(--card);border-radius:18px;padding:18px;border:1px solid var(--line);
      text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.35);
    }
    .spinner{
      width:46px;height:46px;border-radius:50%;border:4px solid rgba(100,116,139,.25);
      border-top-color:var(--primary);margin:10px auto 12px;animation:spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .small{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.45}
    .err{color:var(--danger);font-size:12px;margin-top:10px}
    .note{
      max-width:1100px;margin:10px auto 0;padding:0 16px;
    }
    .success-box{
      display:none;
      background:#ecfdf5;
      color:#166534;
      border:1px solid #bbf7d0;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      box-shadow:0 8px 20px rgba(0,0,0,.04);
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="brand">
      <div class="logo">S</div>
      <div>
        <div class="title">Sandypay</div>
        <div class="sub">MTN Bundles • OTP then Pay</div>
      </div>
    </div>
    <div class="pill">Network: MTN</div>
  </div>

  <div class="note">
    <div class="success-box" id="successBox"></div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <button class="back" onclick="location.href='index.html'">← Back</button>
      <div style="color:var(--muted);font-size:12px">Select a bundle to buy</div>
    </div>

    <div id="packages" class="grid"></div>
    <div id="empty" class="empty">Loading MTN packages...</div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3 id="modalTitle">Confirm Purchase</h3>
          <div class="modal-sub" id="modalSub"></div>
        </div>
        <button class="x" onclick="closeModal()">×</button>
      </div>

      <div class="row">
        <div class="field">
          <label>Recipient Number (to receive data)</label>
          <input id="recipientNumber" inputmode="numeric" placeholder="e.g. 055XXXXXXX" />
        </div>

        <div class="field">
          <label>MoMo Number (to deduct from)</label>
          <input id="momoNumber" inputmode="numeric" placeholder="e.g. 024XXXXXXX" />
        </div>

        <div class="field" id="otpFieldWrap" style="display:none;">
          <label>OTP Code (sent to MoMo number)</label>
          <input id="otpCode" inputmode="numeric" placeholder="Enter OTP" />
        </div>

        <div class="helper">
          ✅ First, we send OTP to confirm the MoMo number.<br/>
          ✅ After OTP verification, a payment page will open for approval.
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn" id="sendOtpBtn" onclick="sendOtp()">Send OTP</button>
        <button class="btn" id="verifyPayBtn" onclick="verifyOtpAndOpenPayment()" style="display:none;">Verify & Pay</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="waitOverlay">
    <div class="overlay-card">
      <div class="spinner"></div>
      <h3 id="overlayTitle">Please wait</h3>
      <div class="small" id="overlayStatus">Processing...</div>
      <div class="err" id="overlayError" style="display:none;"></div>
    </div>
  </div>

  <script>
    const NETWORK = "mtn";
    const API_BASE = "https://sandipay.co";

    let selectedPackage = null;
    let otpSent = false;
    let otpSessionId = null;

    function money(n){ return Number(n).toFixed(2); }
    function isPhone(v){ return /^[0-9]{9,15}$/.test((v || "").replace(/\s+/g, "")); }

    function makeClientRef() {
      return "PAY-" + Date.now() + "-" + Math.random().toString(36).slice(2, 10).toUpperCase();
    }

    function openOverlay(title="Please wait", msg="Processing..."){
      document.getElementById("overlayTitle").innerText = title;
      document.getElementById("overlayStatus").innerText = msg;
      document.getElementById("overlayError").style.display = "none";
      document.getElementById("overlayError").innerText = "";
      document.getElementById("waitOverlay").style.display = "flex";
    }

    function closeOverlay(){
      document.getElementById("waitOverlay").style.display = "none";
    }

    function showOverlayError(msg){
      const err = document.getElementById("overlayError");
      err.style.display = "block";
      err.innerText = msg;
    }

    function showTopSuccess(msg){
      const box = document.getElementById("successBox");
      box.style.display = "block";
      box.innerText = msg;
      window.scrollTo({ top: 0, behavior: "smooth" });
      setTimeout(() => {
        box.style.display = "none";
      }, 7000);
    }

    async function loadPackages(){
      const packagesEl = document.getElementById("packages");
      const emptyEl = document.getElementById("empty");

      packagesEl.innerHTML = "";
      emptyEl.innerText = "Loading MTN packages...";

      try{
        const res = await fetch(`${API_BASE}/api/admin-data?network=${encodeURIComponent(NETWORK)}`);
        const rawText = await res.text();

        if(!res.ok){
          emptyEl.innerText = `Server error (${res.status})`;
          return;
        }

        let data;
        try{
          data = JSON.parse(rawText);
        }catch(e){
          emptyEl.innerText = "Response is not valid JSON.";
          return;
        }

        if(!Array.isArray(data) || data.length === 0){
          emptyEl.innerText = "No MTN packages available.";
          return;
        }

        emptyEl.innerText = "";

        data.forEach(pkg => {
          packagesEl.innerHTML += `
            <div class="pkg">
              <h4>${pkg.package_name}</h4>
              <div class="price">GHS ${money(pkg.price)}</div>
              <div class="meta">Network: ${String(pkg.network || "").toUpperCase()}</div>
              <button class="btn" onclick='openModal(${JSON.stringify(pkg)})'>Buy Bundle</button>
            </div>
          `;
        });

      }catch(err){
        emptyEl.innerText = "Network error. Please try again.";
        console.error(err);
      }
    }

    function openModal(pkg){
      selectedPackage = pkg;

      document.getElementById("modalTitle").innerText =
        `Buy ${pkg.package_name} (${String(pkg.network).toUpperCase()})`;

      document.getElementById("modalSub").innerText =
        `Amount: GHS ${money(pkg.price)} • Enter details below to continue`;

      document.getElementById("recipientNumber").value = "";
      document.getElementById("momoNumber").value = "";
      document.getElementById("otpCode").value = "";

      otpSent = false;
      otpSessionId = null;

      document.getElementById("otpFieldWrap").style.display = "none";
      document.getElementById("sendOtpBtn").style.display = "inline-block";
      document.getElementById("verifyPayBtn").style.display = "none";

      document.getElementById("modalBackdrop").style.display = "flex";
    }

    function closeModal(){
      document.getElementById("modalBackdrop").style.display = "none";
    }

    async function sendOtp(){
      const momo = document.getElementById("momoNumber").value.trim();
      const recipient = document.getElementById("recipientNumber").value.trim();

      if(!selectedPackage){
        alert("Please select a package again.");
        return;
      }

      if(!isPhone(recipient)){
        alert("Enter a valid recipient number.");
        return;
      }

      if(!isPhone(momo)){
        alert("Enter a valid MoMo number.");
        return;
      }

      openOverlay("Sending OTP", "Please wait while we send OTP to the MoMo number...");

      try{
        const res = await fetch(`${API_BASE}/api/send-momo-otp`, {
          method: "POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify({ momo_number: momo })
        });

        const out = await res.json();

        if(!res.ok || !out.ok){
          showOverlayError(out.message || `Failed to send OTP`);
          setTimeout(closeOverlay, 1800);
          return;
        }

        otpSent = true;
        otpSessionId = out.session_id || null;

        closeOverlay();

        document.getElementById("otpFieldWrap").style.display = "block";
        document.getElementById("sendOtpBtn").style.display = "none";
        document.getElementById("verifyPayBtn").style.display = "inline-block";

        alert("OTP sent successfully. Please enter the OTP.");

      }catch(err){
        showOverlayError("Network error sending OTP.");
        setTimeout(closeOverlay, 1800);
      }
    }

    async function verifyOtpAndOpenPayment(){
      const momo = document.getElementById("momoNumber").value.trim();
      const recipient = document.getElementById("recipientNumber").value.trim();
      const otp = document.getElementById("otpCode").value.trim();

      if(!selectedPackage){
        alert("Please select package again.");
        return;
      }

      if(!otpSent){
        alert("Please send OTP first.");
        return;
      }

      if(!/^[0-9]{4,8}$/.test(otp)){
        alert("Enter a valid OTP.");
        return;
      }

      openOverlay("Verifying OTP", "Please wait while we verify your OTP...");

      try{
        const res = await fetch(`${API_BASE}/api/verify-momo-otp`, {
          method: "POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify({
            momo_number: momo,
            otp,
            session_id: otpSessionId
          })
        });

        const out = await res.json();

        if(!res.ok || !out.ok){
          showOverlayError(out.message || "OTP verification failed.");
          setTimeout(closeOverlay, 2000);
          return;
        }

        const vendor_id = localStorage.getItem("vendor_id") || 1;
        const client_ref = makeClientRef();

        sessionStorage.setItem("last_client_ref", client_ref);

        const qs = new URLSearchParams({
          client_ref,
          package_id: String(selectedPackage.id || ""),
          package_name: String(selectedPackage.package_name || ""),
          amount: String(selectedPackage.price || ""),
          network: String(selectedPackage.network || ""),
          momo_number: momo,
          recipient_number: recipient,
          vendor_id: String(vendor_id),
          source_page: "mtn.html"
        });

        closeOverlay();
        closeModal();

        window.location.href = `payment_wait.html?${qs.toString()}`;

        if(!payWindow){
          alert("Popup was blocked. Please allow popups for this site.");
          return;
        }

      }catch(err){
        showOverlayError("Network error verifying OTP.");
        setTimeout(closeOverlay, 2000);
      }
    }

    function checkPaymentReturnMessage(){
      const params = new URLSearchParams(window.location.search);
      const status = params.get("payment");
      const msg = params.get("message");

      if(status === "success"){
        showTopSuccess(msg ? decodeURIComponent(msg) : "Payment successful.");
        window.history.replaceState({}, document.title, "mtn.html");
      }
    }

    loadPackages();
    checkPaymentReturnMessage();
  </script>
</body>
</html>
