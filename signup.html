<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account • Sandypay</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Segoe UI", sans-serif;
    }

    :root{
      --primary:#0a0f5a;
      --secondary:#16227a;
      --light:#ffffff;
      --bg:#f4f7ff;
      --shadow:0 15px 40px rgba(0,0,0,0.12);
    }

    body{
      min-height:100vh;
      background:
      linear-gradient(rgba(10,15,90,0.85), rgba(22,34,122,0.88)),
      url('https://images.unsplash.com/photo-1556740749-887f6717d7e4?q=80&w=1200&auto=format&fit=crop') center/cover no-repeat;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      overflow-x:hidden;
    }

    /* Floating animation background */
    body::before,
    body::after{
      content:"";
      position:absolute;
      width:350px;
      height:350px;
      border-radius:50%;
      background:rgba(255,255,255,0.06);
      z-index:0;
      animation: float 8s ease-in-out infinite;
    }

    body::before{
      top:-120px;
      left:-120px;
    }

    body::after{
      bottom:-120px;
      right:-120px;
      animation-delay:3s;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(20px);
      }
    }

    .main-container{
      width:100%;
      max-width:450px;
      position:relative;
      z-index:10;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .glass-card{
      background:rgba(255,255,255,0.14);
      backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:28px;
      padding:30px 25px;
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .glass-card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:6px;
      background:linear-gradient(90deg,#4facfe,#00f2fe,#4facfe);
      background-size:300% 300%;
      animation: gradientMove 6s ease infinite;
    }

    @keyframes gradientMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .nav-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
      color:white;
    }

    .menu-icon,
    .power-icon{
      width:45px;
      height:45px;
      display:flex;
      justify-content:center;
      align-items:center;
      border-radius:14px;
      background:rgba(255,255,255,0.15);
      font-size:22px;
      cursor:pointer;
      transition:0.3s;
    }

    .menu-icon:hover,
    .power-icon:hover{
      transform:scale(1.08);
      background:rgba(255,255,255,0.25);
    }

    .logo{
      text-align:center;
      margin-bottom:20px;
    }

    .logo h1{
      color:white;
      font-size:30px;
      font-weight:800;
      letter-spacing:1px;
    }

    .subtitle{
      color:rgba(255,255,255,0.8);
      font-size:14px;
      margin-top:5px;
    }

    .form-container{
      margin-top:20px;
    }

    .input-group{
      position:relative;
      margin-bottom:18px;
    }

    .input-group input,
    .input-group select{
      width:100%;
      padding:16px 18px;
      border:none;
      outline:none;
      border-radius:16px;
      background:rgba(255,255,255,0.18);
      color:white;
      font-size:15px;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.15);
    }

    .input-group input::placeholder{
      color:rgba(255,255,255,0.75);
    }

    .input-group select{
      color:white;
      appearance:none;
    }

    .input-group select option{
      color:black;
    }

    .input-group input:focus,
    .input-group select:focus{
      background:rgba(255,255,255,0.24);
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(0,0,0,0.15);
    }

    .role-label{
      color:white;
      margin-bottom:10px;
      display:block;
      font-size:14px;
      font-weight:600;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#ffffff,#dfe9ff);
      color:var(--primary);
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      transition:0.35s;
      margin-top:10px;
      box-shadow:0 10px 25px rgba(0,0,0,0.15);
    }

    button:hover{
      transform:translateY(-3px) scale(1.01);
      box-shadow:0 18px 35px rgba(0,0,0,0.22);
    }

    button:active{
      transform:scale(0.98);
    }

    .footer-text{
      margin-top:22px;
      text-align:center;
      color:rgba(255,255,255,0.75);
      font-size:13px;
    }

    /* Success Modal */
    .success-modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:999;
      padding:20px;
    }

    .success-box{
      background:white;
      width:100%;
      max-width:350px;
      padding:30px 20px;
      border-radius:24px;
      text-align:center;
      animation: popup 0.4s ease;
    }

    @keyframes popup{
      from{
        opacity:0;
        transform:scale(0.7);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    .check{
      width:70px;
      height:70px;
      margin:auto;
      border-radius:50%;
      background:#dcfce7;
      color:#16a34a;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:35px;
      margin-bottom:18px;
    }

    .success-box h2{
      color:#0a0f5a;
      margin-bottom:8px;
    }

    .success-box p{
      color:#666;
      font-size:14px;
    }

    @media(max-width:600px){

      .glass-card{
        padding:25px 18px;
        border-radius:22px;
      }

      .logo h1{
        font-size:24px;
      }

      .input-group input,
      .input-group select{
        padding:14px 15px;
      }

      button{
        padding:14px;
      }
    }
  </style>
</head>

<body>

  <div class="main-container">

    <div class="glass-card">

      <div class="nav-bar">
        <div class="menu-icon">&#9776;</div>
        <div class="power-icon">&#x23FB;</div>
      </div>

      <div class="logo">
        <h1>CREATE ACCOUNT</h1>
        <p class="subtitle">FOR USER AND ADMIN</p>
      </div>

      <div class="form-container">
        <form id="signupForm">

          <div class="input-group">
            <input type="text" id="username" placeholder="Business name" required />
          </div>

          <div class="input-group">
            <input type="email" id="email" placeholder="Email" required />
          </div>

          <div class="input-group">
            <input type="tel" id="phone" placeholder="Phone number" required />
          </div>

          <div class="input-group">
            <input type="password" id="password" placeholder="PIN" required />
          </div>

          <div class="input-group">
            <input type="password" id="confirmpin" placeholder="Confirm PIN" required />
          </div>

          <label class="role-label">Registering as:</label>

          <div class="input-group">
            <select id="accountType" name="accountType" required>
              <option value="" disabled selected>Select role</option>
              <option value="vendor">Vendor</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <button type="submit" id="submitBtn">
            CREATE ACCOUNT
          </button>

        </form>

        <div class="footer-text">
          © Sandypay Secure Registration
        </div>

      </div>

    </div>

  </div>

  <!-- Success Modal -->
  <div class="success-modal" id="successModal">
    <div class="success-box">
      <div class="check">✔</div>
      <h2>Account Created</h2>
      <p>User account has been created successfully.</p>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      const form = document.getElementById("signupForm");
      const submitBtn = document.getElementById("submitBtn");

      form.addEventListener("submit", async function (e) {

        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const sender_id = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const confirmpin = document.getElementById("confirmpin").value.trim();
        const role = document.getElementById("accountType").value;

        // PIN validation
        if (password !== confirmpin) {
          alert("PINs do not match!");
          return;
        }

        if (password === "0000") {
          alert("You cannot use '0000' as your PIN.");
          return;
        }

        try {

          submitBtn.innerHTML = "Creating...";
          submitBtn.disabled = true;

          const response = await fetch("https://sandipay.co/api/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              username,
              phone,
              sender_id,
              password,
              role
            })
          });

          const result = await response.text();

          // Success UI
          document.getElementById("successModal").style.display = "flex";

          setTimeout(() => {
            document.getElementById("successModal").style.display = "none";
          }, 2500);

          form.reset();

        } catch (err) {

          alert("Something went wrong: " + err.message);

        } finally {

          submitBtn.innerHTML = "CREATE ACCOUNT";
          submitBtn.disabled = false;
        }
      });

    });
  </script>

</body>
</html>
